<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas - Restaurante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #764ba2;
        }

        .info-restaurante {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-restaurante p {
            margin: 5px 0;
            color: #333;
        }

        .info-restaurante .mesas {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .reservas-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .reservas-container h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .reservas-lista {
            max-height: 400px;
            overflow-y: auto;
        }

        .reserva-item {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #48c774;
        }

        .reserva-cliente {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }

        .reserva-detalle {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .reserva-estado {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 8px;
        }

        .estado-exitosa {
            background-color: #55efc4;
            color: #006266;
        }

        .estado-fallida {
            background-color: #ff7675;
            color: #d63031;
        }

        .estado-pendiente {
            background-color: #ffeaa7;
            color: #d63031;
        }

        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Reservas</h1>
        <div class="subtitle">Gestion de reservas con Promesas y Async Await</div>

        <div class="panel">
            <div class="card">
                <h2>Hacer Nueva Reserva</h2>
                <div class="info-restaurante">
                    <p><strong>Restaurante "El Sabor"</strong></p>
                    <p>Mesas disponibles: <span class="mesas" id="mesas_disponibles">10</span></p>
                    <p>Capacidad maxima por reserva: 5 mesas</p>
                </div>
                <div class="form-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="nombre_cliente" placeholder="Ej: Juan Perez">
                </div>
                <div class="form-group">
                    <label>Numero de Mesas (1-5)</label>
                    <input type="number" id="mesas_solicitadas" min="1" max="5" value="1">
                </div>
                <button id="btn_hacer_reserva">Hacer Reserva</button>
            </div>

            <div class="card">
                <h2>Configuracion</h2>
                <div class="form-group">
                    <label>Total Mesas en Restaurante</label>
                    <input type="number" id="total_mesas" min="1" max="20" value="10">
                </div>
                <button id="btn_actualizar_mesas">Actualizar Mesas</button>
                <button id="btn_limpiar_reservas" style="margin-top: 10px; background-color: #ff6b6b;">Limpiar Reservas</button>
            </div>
        </div>

        <div class="reservas-container">
            <h2>Historial de Reservas</h2>
            <div id="lista_reservas" class="reservas-lista">
                <div style="text-align: center; padding: 40px; color: #999;">
                    No hay reservas realizadas
                </div>
            </div>
        </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <script src="reservas.js"></script>
</body>
</html>
