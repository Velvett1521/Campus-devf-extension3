<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Consumer - Fetch vs Axios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .btn-fetch {
            background-color: #ff6b6b;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-axios {
            background-color: #48c774;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .data-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .data-header h2 {
            color: #667eea;
        }

        .info-badge {
            background-color: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .character-card {
            background: #f7f7f7;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .character-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .character-info {
            padding: 15px;
        }

        .character-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .character-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 8px;
        }

        .status-alive {
            background-color: #55efc4;
            color: #006266;
        }

        .status-dead {
            background-color: #ff7675;
            color: #d63031;
        }

        .status-unknown {
            background-color: #dfe6e9;
            color: #636e72;
        }

        .character-species {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #d63031;
            font-size: 1.2em;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.1em;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .page-btn {
            padding: 8px 15px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background-color: #764ba2;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .page-info {
            padding: 8px 15px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Personajes de Rick and Morty</h1>
        <div class="subtitle">Comparando Fetch vs Axios para consumir APIs</div>

        <div class="buttons-container">
            <button class="btn btn-fetch" id="btn_fetch">
                Obtener con Fetch
            </button>
            <button class="btn btn-axios" id="btn_axios">
                Obtener con Axios
            </button>
        </div>

        <div class="data-container">
            <div class="data-header">
                <h2>Personajes</h2>
                <div class="info-badge" id="info_badge">API: Rick and Morty</div>
            </div>
            <div id="data_container">
                <div class="empty">
                    Haz clic en un boton para cargar los personajes
                </div>
            </div>
            <div id="pagination_container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
