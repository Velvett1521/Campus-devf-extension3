<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Gestion de Libros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #764ba2;
        }

        .btn-consultar {
            background-color: #48c774;
            width: 100%;
        }

        .btn-consultar:hover {
            background-color: #3aac62;
        }

        .inventario {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .inventario h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .libros-lista {
            max-height: 500px;
            overflow-y: auto;
        }

        .libro-item {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .libro-titulo {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        .libro-detalle {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .libro-disponible {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .disponible-true {
            background-color: #55efc4;
            color: #006266;
        }

        .disponible-false {
            background-color: #ff7675;
            color: #d63031;
        }

        .btn-prestar, .btn-devolver {
            padding: 5px 10px;
            font-size: 0.85em;
            margin-left: 10px;
        }

        .btn-prestar {
            background-color: #fdcb6e;
        }

        .btn-devolver {
            background-color: #00b894;
        }

        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestion de Biblioteca</h1>
        <div class="subtitle">Sistema de inventario con Callbacks y JSON</div>

        <div class="panel">
            <div class="card">
                <h2>Agregar Libro</h2>
                <div class="form-group">
                    <label>Titulo</label>
                    <input type="text" id="titulo_libro" placeholder="Ej: Cien anos de soledad">
                </div>
                <div class="form-group">
                    <label>Autor</label>
                    <input type="text" id="autor_libro" placeholder="Ej: Gabriel Garcia Marquez">
                </div>
                <div class="form-group">
                    <label>Genero</label>
                    <input type="text" id="genero_libro" placeholder="Ej: Novela">
                </div>
                <button id="btn_agregar">Agregar Libro</button>
            </div>

            <div class="card">
                <h2>Actualizar Disponibilidad</h2>
                <div class="form-group">
                    <label>ID del Libro</label>
                    <input type="number" id="libro_id" placeholder="Ingrese el ID del libro">
                </div>
                <div class="form-group">
                    <label>Nuevo Estado</label>
                    <select id="nuevo_estado">
                        <option value="true">Disponible</option>
                        <option value="false">Prestado</option>
                    </select>
                </div>
                <button id="btn_actualizar">Actualizar Estado</button>
            </div>

            <div class="card">
                <h2>Consultar Inventario</h2>
                <button id="btn_consultar" class="btn-consultar">Consultar Todos los Libros</button>
            </div>
        </div>

        <div class="inventario">
            <h2>Inventario de Libros</h2>
            <div id="lista_libros" class="libros-lista">
                <div class="libro-item">Haz clic en "Consultar Todos los Libros" para ver el inventario</div>
            </div>
        </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <script src="biblioteca.js"></script>
</body>
</html>
